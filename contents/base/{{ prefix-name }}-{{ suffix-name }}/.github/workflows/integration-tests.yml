name: {{ prefix-name }}-{{ suffix-name }} Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'pyproject.toml'
      - '.github/workflows/integration-tests.yml'
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Mondays at 6 AM UTC

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  build:
    name: "Build Package"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python and uv
        uses: p6m-actions/python-uv-setup@v1
        with:
          python-version: ${{'{'}}{ matrix.python-version }}

      - name: Build package
        run: |
          uv sync --python ${{'{'}}{ matrix.python-version }}
          uv build
          echo "✅ Package built successfully"

  integration-test-docker:
    name: "Docker Stack Integration"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Docker stack
        run: docker compose up --build -d

      - name: Wait for service readiness
        run: |
          for i in {1..36}; do
            if curl -sf http://localhost:8080/health/live >/dev/null 2>&1; then
              echo "✅ Service is responding"
              sleep 2
              break
            fi
            echo "Waiting for service... (attempt $i/36)"
            sleep 5
          done
          if ! curl -sf http://localhost:8080/health/live; then
            echo "❌ Service failed to become ready"
            docker compose logs {{ prefix-name }}-{{ suffix-name }}
            exit 1
          fi

      - name: Verify health endpoints
        run: |
          curl -sf http://localhost:8080/health/live
          curl -sf http://localhost:8080/health/ready
          curl -sf http://localhost:8080/
          curl -sf http://localhost:8000/health/live
          curl -sf http://localhost:8000/
          echo "✅ All endpoints healthy"

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs {{ prefix-name }}-{{ suffix-name }}

      - name: Cleanup
        if: always()
        run: docker compose down -v

  integration-test-summary:
    name: "Integration Test Summary"
    runs-on: ubuntu-latest
    needs: [build, integration-test-docker]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "=== Integration Test Results ==="
          echo "Build: ${{'{'}}{ needs.build.result }}"
          echo "Docker stack: ${{'{'}}{ needs.integration-test-docker.result }}"

          if [[ "${{'{'}}{ needs.build.result }}" != "success" ]]; then
            echo "❌ Package build failed"
            exit 1
          fi

          if [[ "${{'{'}}{ needs.integration-test-docker.result }}" != "success" ]]; then
            echo "❌ Docker integration tests failed"
            exit 1
          fi

          echo "✅ All integration tests passed!"
