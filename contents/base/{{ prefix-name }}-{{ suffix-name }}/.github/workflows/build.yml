name: Build

on:
  - push
  - workflow_dispatch

permissions:
  contents: write   # required by python-uv-cut-tag to push version tags
  id-token: write   # required by token-exchange inside python-uv-cut-tag

env:
  IMAGE_NAME: {{ prefix-name }}-{{ suffix-name }}

jobs:
  build_and_deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    outputs:
      version: ${{'{'}}{steps.cut-patch.outputs.version }}
      digest: ${{'{'}}{steps.docker-publish.outputs.image-digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python and uv
        uses: p6m-actions/python-uv-setup@v1
        with:
          python-version: "3.11"

      - name: Login to Python Repository
        uses: p6m-actions/python-uv-repository-login@v1
        with:
          credentials: |
            artifactory=${{'{'}}{ secrets.ARTIFACTORY_USERNAME }}:${{'{'}}{ secrets.ARTIFACTORY_IDENTITY_TOKEN }}

      - name: Cut Patch Version
        if: github.ref_name == 'main'
        id: cut-patch
        uses: p6m-actions/python-uv-cut-tag@v1
        with:
          version-level: patch

      - name: Build Python Application
        uses: p6m-actions/python-uv-build@v1

      - name: Login to Docker Repository
        uses: p6m-actions/docker-repository-login@v1
        with:
          registry: ${{'{'}}{ vars.ARTIFACTORY_HOSTNAME }}
          username: ${{'{'}}{ secrets.ARTIFACTORY_USERNAME }}
          password: ${{'{'}}{ secrets.ARTIFACTORY_IDENTITY_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: p6m-actions/docker-buildx-setup@v1

      - name: Build and Publish Docker Image
        id: docker-publish
        uses: p6m-actions/docker-buildx-build-publish@v1
        with:
          image-name: {{ prefix-name }}-{{ suffix-name }}-server
          image-tag: ${{'{'}}{ steps.cut-patch.outputs.version || format('dev-{0}', github.sha) }}
          registry: ${{'{'}}{ vars.ARTIFACTORY_HOSTNAME }}/${{'{'}}{ vars.ARTIFACTORY_PROJECT }}-docker-local/applications
          platforms: linux/amd64,linux/arm64
          push: ${{'{'}}{github.ref_name == 'main' }}
          skip-setup: true
          builder-name: ${{'{'}}{ steps.buildx.outputs.name }}

  update-application-manifest:
    name: Update Application Manifest
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    needs: build_and_deploy
    steps:
      - name: Update Application Manifest
        uses: p6m-actions/platform-application-manifest-dispatch@v1
        with:
          repository: ${{'{'}}{ github.repository }}
          image-name: ${{'{'}}{env.IMAGE_NAME }}
          environment: "dev"
          digest: ${{'{'}}{ needs.build_and_deploy.outputs.digest }}
          update-manifest-token: ${{'{'}}{ secrets.UPDATE_MANIFEST_TOKEN }}
          platform-dispatch-url: ${{'{'}}{ vars.PLATFORM_DISPATCH_URL }}
          directory-name: {{ prefix-name }}-{{ suffix-name }}
